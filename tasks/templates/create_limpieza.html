{% extends 'base.html' %}
{% load widget_tweaks %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-lg">
                <div class="card-header bg-primary text-white">
                    <h2 class="h4 mb-0">
                        <i class="fas fa-broom me-2"></i>Programar Limpieza
                    </h2>
                </div>
                <div class="card-body p-4">
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    {% include 'partials/limpieza_form.html' with submit_label='Guardar Limpieza' %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
